<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strode - The Edupath Alchemy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #1a0026;
            --mystic-purple: #4b0082;
            --metallic-silver: #c0c0c0;
            --gold-leaf: #d4af37;
            --obsidian: #050505;
            --glass: rgba(255, 255, 255, 0.15);
            --magic-font: 'Cinzel Decorative', cursive;
            --body-font: 'MedievalSharp', cursive;
            --accent-color: var(--mystic-purple);
        }

        body.theme-festive-gold { --accent-color: #d4af37; --obsidian: #1a1400; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #2e003e 0%, var(--obsidian) 100%);
            background-attachment: fixed;
            color: var(--metallic-silver);
            font-family: var(--body-font);
            min-height: 100vh;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--obsidian);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000;
        }
        .loader-arc {
            width: 80px; height: 80px;
            border: 4px solid var(--mystic-purple);
            border-top: 4px solid var(--gold-leaf);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; z-index: -1; pointer-events: none;
        }

        .metallic-text {
            background: linear-gradient(to bottom, #fff 0%, #999 50%, #444 51%, #999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--magic-font);
        }

        #onboarding-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 5000;
        }

        .ritual-card {
            background: rgba(20, 10, 30, 0.95);
            padding: 2.5rem;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 50px var(--accent-color);
            border-radius: 20px;
            max-width: 550px; width: 90%;
            max-height: 90vh; overflow-y: auto;
            text-align: center; position: relative;
        }

        .close-wizard-x {
            position: absolute; top: 15px; right: 20px;
            font-size: 2.5rem; color: var(--accent-color);
            cursor: pointer; line-height: 1; transition: 0.3s;
            display: none;
        }
        .close-wizard-x:hover { color: white; transform: scale(1.1); }

        input, select, textarea {
            background: var(--glass);
            border: 1px solid var(--accent-color);
            color: white; padding: 12px; margin: 10px 0; width: 100%;
            border-radius: 8px; font-family: var(--body-font);
        }

        .day-check-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left;
            margin: 15px 0; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px;
            max-height: 200px; overflow-y: auto;
        }
        .day-check-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .day-check-item input { width: auto; margin: 0; }

        button {
            background: linear-gradient(45deg, var(--accent-color), #8000ff);
            color: white; border: none; padding: 12px 24px;
            font-family: var(--magic-font); cursor: pointer;
            border-radius: 30px; margin: 5px; transition: 0.3s;
            font-size: 0.8rem;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent-color); }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            visibility: hidden;
            display: none;
        }

        .sidebar {
            background: rgba(10, 0, 15, 0.98);
            border-right: 1px solid rgba(192, 192, 192, 0.1);
            padding: 30px;
            display: flex; flex-direction: column;
        }

        .nav-links li {
            padding: 15px; margin: 8px 0; cursor: pointer; list-style: none;
            border-radius: 12px; transition: 0.3s;
            font-family: 'Segoe UI Emoji', Arial, sans-serif;
            font-weight: bold;
            background: rgba(255,255,255,0.03);
        }
        .nav-links li:hover, .nav-links li.active { background: var(--accent-color); color: white; }

        .main-content { padding: 40px; overflow-y: auto; height: 100vh; }

        .mini-card {
            background: var(--glass);
            border: 1px solid var(--accent-color);
            padding: 20px; border-radius: 15px; margin-top: 20px;
        }

        .caution-box {
            border: 2px solid #ff3333; padding: 15px; border-radius: 10px;
            background: rgba(255, 0, 0, 0.15); margin: 15px 0;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-arc"></div>
    <h2 class="metallic-text" style="margin-top: 20px;">Preparing Alchemy...</h2>
</div>

<div class="bg-overlay"></div>

<audio id="bgm" loop preload="auto">
    <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Light.mp3" type="audio/mpeg">
</audio>

<div id="onboarding-overlay">
    <div class="ritual-card">
        <span class="close-wizard-x" id="wizard-close-btn" onclick="closeWizard()">&times;</span>
        <h1 class="metallic-text" id="wizard-title" style="font-size: 2.5rem;">Strode</h1>
        <div id="step-content"></div>
    </div>
</div>

<div class="app-container" id="main-app">
    <aside class="sidebar">
        <img src="logo.png" alt="Strode" style="width:100%; border-radius: 10px;">
        <h3 id="alchemist-name-display" class="metallic-text" style="text-align:center; margin-top:20px;">ALCHEMIST</h3>
        
        <ul class="nav-links">
            <li onclick="switchTab('plans')" id="tab-plans" class="active">🔮 <span data-i18n="grimoire">Grimoire</span></li>
            <li onclick="switchTab('routine')" id="tab-routine">📜 <span data-i18n="routine">Routine</span></li>
            <li onclick="switchTab('memos')" id="tab-memos">🖋️ <span data-i18n="memos">Memos</span></li>
            <li onclick="switchTab('oracle')" id="tab-oracle">🏮 <span data-i18n="oracle">Oracle</span></li>
        </ul>
        <button onclick="logout()" style="background: #440000; font-size: 0.6rem; margin-top: auto;" data-i18n="logout">Banish Session</button>
    </aside>

    <main class="main-content">
        <section id="sec-plans">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1 class="metallic-text" data-i18n="active">Active Transmutation</h1>
                <button onclick="openWizard()">+ New Ritual</button>
            </div>
            <div id="active-ritual-display"></div>
            <h2 class="metallic-text" style="font-size: 1.2rem; margin-top: 40px;" data-i18n="stored">Stored Grimoire</h2>
            <div id="grimoire-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:20px;"></div>
        </section>

        <section id="sec-chapters" class="hidden">
            <button onclick="switchTab('plans')">← <span data-i18n="back">Back</span></button>
            <h1 class="metallic-text" id="sanctum-title" style="margin-top:20px;">Chapter Sanctum</h1>
            <div id="chapter-list-container" class="mini-card"></div>
        </section>

        <section id="sec-routine" class="hidden">
            <h1 class="metallic-text" data-i18n="routine">Daily Routine</h1>
            <textarea id="routine-text" rows="18" placeholder="Type your daily cycle..."></textarea>
            <button onclick="saveStatic()" data-i18n="seal">Seal Routine</button>
        </section>

        <section id="sec-memos" class="hidden">
            <h1 class="metallic-text" data-i18n="memos">Arcane Memos</h1>
            <textarea id="memo-text" rows="18" placeholder="Store your wisdom..."></textarea>
            <button onclick="saveStatic()" data-i18n="seal">Seal Memos</button>
        </section>

        <section id="sec-oracle" class="hidden">
            <h1 class="metallic-text" data-i18n="oracle">The Oracle</h1>
            <div id="oracle-data" class="mini-card" style="text-align: center;"></div>
        </section>
    </main>
</div>

<script>
    const STORAGE_KEY = 'strode_v17_final';
    const i18n = {
        en: { lang: "Select Language", auth: "Identity", login: "Awaken", signup: "New Soul", stats: "Chronos Profile", week: "Weekday Hours", end: "Weekend Hours", days: "Select Weekend Days", subjectDays: "Study days for this subject?", next: "Next", seal: "Seal", logout: "Logout", grimoire: "Grimoire", routine: "Routine", memos: "Memos", oracle: "Oracle", active: "Active Transmutation", stored: "Stored", caution: "⚠️ Low Energy Flow", opt1: "1. Still Proceed", opt2: "2. Change Dates", opt3: "3. Change Study Hours", back: "Back" },
        hi: { lang: "भाषा चुनें", auth: "पहचान", login: "जाग्रत करें", signup: "नई पहचान", stats: "समय प्रोफ़ाइल", week: "कार्यदिवस के घंटे", end: "सप्ताहांत के घंटे", days: "सप्ताहांत चुनें", subjectDays: "इस विषय के लिए पढ़ाई के दिन?", next: "आगे", seal: "मोहर", logout: "सत्र समाप्त", grimoire: "ग्रिमॉयर", routine: "दिनचर्या", memos: "नोट्स", oracle: "ओरेकल", active: "सक्रिय ट्रांसम्यूटेशन", stored: "संग्रहीत", caution: "⚠️ कम ऊर्जा", opt1: "1. अभी भी आगे बढ़ें", opt2: "2. तिथियां बदलें", opt3: "3. पढ़ाई के घंटे बदलें", back: "पीछे" },
        es: { lang: "Idioma", auth: "Identidad", login: "Despertar", signup: "Nueva Alma", stats: "Perfil Chronos", week: "Horas Semanales", end: "Horas Fin de Semana", days: "Días de Fin de Semana", subjectDays: "¿Días de estudio?", next: "Siguiente", seal: "Sellar", logout: "Cerrar", grimoire: "Grimorio", routine: "Rutina", memos: "Notas", oracle: "Oráculo", active: "Transmutación Activa", stored: "Guardado", caution: "⚠️ Energía Baja", opt1: "1. Proceder", opt2: "2. Cambiar Fechas", opt3: "3. Cambiar Horas", back: "Volver" },
        fr: { lang: "Langue", auth: "Identité", login: "Éveiller", signup: "Nouvelle Âme", stats: "Profil Chronos", week: "Heures Semaine", end: "Heures Weekend", days: "Jours de Weekend", subjectDays: "Jours d'étude?", next: "Suivant", seal: "Sceller", logout: "Quitter", grimoire: "Grimoire", routine: "Routine", memos: "Mémos", oracle: "Oracle", active: "Transmutation Active", stored: "Stocké", caution: "⚠️ Énergie Faible", opt1: "1. Continuer", opt2: "2. Dates", opt3: "3. Heures", back: "Retour" },
        de: { lang: "Sprache", auth: "Identität", login: "Erwachen", signup: "Neue Seele", stats: "Chronos-Profil", week: "Wochentagsstunden", end: "Wochenendstunden", days: "Wochenendtage", subjectDays: "Studientage?", next: "Weiter", seal: "Versiegeln", logout: "Abmelden", grimoire: "Grimoire", routine: "Routine", memos: "Memos", oracle: "Orakel", active: "Aktive Transmutation", stored: "Gespeichert", caution: "⚠️ Wenig Energie", opt1: "1. Weitermachen", opt2: "2. Daten", opt3: "3. Stunden", back: "Zurück" },
        zh: { lang: "语言", auth: "身份", login: "觉醒", signup: "新灵魂", stats: "时间档案", week: "工作日时长", end: "周末时长", days: "周末日期", subjectDays: "学习日期？", next: "下一步", seal: "密封", logout: "登出", grimoire: "魔法书", routine: "常规", memos: "备忘录", oracle: "神谕", active: "活跃转化", stored: "存储", caution: "⚠️ 能量流低", opt1: "1. 继续", opt2: "2. 修改日期", opt3: "3. 修改时长", back: "返回" },
        ja: { lang: "言語選択", auth: "身元", login: "目覚める", signup: "新しい魂", stats: "クロノスプロファイル", week: "平日時間", end: "週末時間", days: "週末の曜日", subjectDays: "学習日？", next: "次へ", seal: "封印", logout: "ログアウト", grimoire: "魔導書", routine: "ルーチン", memos: "メモ", oracle: "オラクル", active: "アクティブな変換", stored: "保存済み", caution: "⚠️ 低エネルギー", opt1: "1. 続行する", opt2: "2. 日付変更", opt3: "3. 時間変更", back: "戻る" },
        ru: { lang: "Язык", auth: "Личность", login: "Пробудить", signup: "Новая Душа", stats: "Профиль Хроноса", week: "Будни (часы)", end: "Выходные (часы)", days: "Выходные дни", subjectDays: "Дни занятий?", next: "Далее", seal: "Печать", logout: "Выйти", grimoire: "Гримуар", routine: "Рутина", memos: "Заметки", oracle: "Оракул", active: "Активная трансмутация", stored: "Сохранено", caution: "⚠️ Мало энергии", opt1: "1. Продолжить", opt2: "2. Даты", opt3: "3. Часы", back: "Назад" },
        ar: { lang: "اللغة", auth: "الهوية", login: "استيقظ", signup: "روح جديدة", stats: "ملف كرونوس", week: "ساعات الأسبوع", end: "ساعات عطلة", days: "أيام العطلة", subjectDays: "أيام الدراسة؟", next: "التالي", seal: "ختم", logout: "خروج", grimoire: "كتاب السحر", routine: "روتين", memos: "مذكرات", oracle: "أوراكل", active: "التحويل النشط", stored: "مخزن", caution: "⚠️ طاقة منخفضة", opt1: "1. استمر", opt2: "2. التواريخ", opt3: "3. الساعات", back: "رجوع" }
    };

    let state = { currentUser: null, users: {} };
    let wizardTemp = { editingIndex: null, data: {}, mode: 'weekdays' };
    let currentLang = 'en';

    window.onload = () => {
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000);
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
        fetchOracle();
        goToStep('lang');
    };

    function translateApp() {
        const L = i18n[currentLang] || i18n['en'];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(L[key]) el.innerText = L[key];
        });
    }

    function goToStep(step) {
        const content = document.getElementById('step-content');
        const L = i18n[currentLang] || i18n['en'];
        const closeBtn = document.getElementById('wizard-close-btn');

        if (state.currentUser && state.users[state.currentUser].plans.length > 0) closeBtn.style.display = "block";
        else closeBtn.style.display = "none";
        
        if (step === 'lang') {
            content.innerHTML = `<h2>${L.lang}</h2><select id="l-sel">
                <option value="en">English</option><option value="hi">हिन्दी</option><option value="es">Español</option>
                <option value="fr">Français</option><option value="de">Deutsch</option><option value="zh">中文</option>
                <option value="ja">日本語</option><option value="ru">Русский</option><option value="ar">العربية</option>
            </select><button onclick="setLang()">${L.next}</button>`;
        } else if (step === 'auth') {
            content.innerHTML = `<h2>${L.auth}</h2><input id="a-name" placeholder="Name"><input type="password" id="a-pass" placeholder="Passkey">
                <button onclick="handleAuth('login')">${L.login}</button><hr style="opacity:0.1;margin:10px;"><button onclick="handleAuth('signup')" style="background:#333">${L.signup}</button>
                <br><button style="background:transparent; color:gray;" onclick="goToStep('lang')">${L.back}</button>`;
        } else if (step === 'stats') {
            const u = state.users[state.currentUser];
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            let dayHtml = days.map((d, i) => `<div class="day-check-item"><input type="checkbox" value="${i}" ${u.weekends && u.weekends.includes(i) ? 'checked' : (i==0||i==6?'checked':'')}> ${d}</div>`).join('');
            content.innerHTML = `<h2>${L.stats}</h2><p>${L.week}</p><input type="number" id="h-week" value="${u.weekdayH || 4}"><p>${L.end}</p><input type="number" id="h-end" value="${u.weekendH || 8}"><p><b>${L.days}</b></p><div class="day-check-grid" id="weekend-checks">${dayHtml}</div>
                <button onclick="saveStats()">${L.next}</button><br><button style="background:transparent; color:gray;" onclick="goToStep('auth')">${L.back}</button>`;
        } else if (step === 1) {
            content.innerHTML = `<h2>Step 1: Goal</h2><input id="r-title" placeholder="Ritual Name" value="${wizardTemp.data.title || ''}"><select id="r-goal"><option ${wizardTemp.data.goal==='Olympiad'?'selected':''}>Olympiad</option><option ${wizardTemp.data.goal==='School'?'selected':''}>School</option></select>
                <button onclick="saveR1()">${L.next}</button>`;
                // No back button on first step of wizard as requested
        } else if (step === 2) {
            content.innerHTML = `<h2>Step 2: Time</h2><p>Chapters:</p><input type="number" id="r-chaps" value="${wizardTemp.data.chapters || 10}"><p>Start Date:</p><input type="date" id="r-start" value="${wizardTemp.data.start || ''}"><p>End Date:</p><input type="date" id="r-end" value="${wizardTemp.data.end || ''}">
                <button onclick="saveR2()">${L.next}</button><br><button style="background:transparent; color:gray;" onclick="goToStep(1)">${L.back}</button>`;
        } else if (step === 3) {
            renderScheduleStep();
        }
    }

    function renderScheduleStep() {
        const L = i18n[currentLang] || i18n['en'];
        const content = document.getElementById('step-content');
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        
        let html = `<h2>Step 3: Schedule</h2><div style="margin-bottom:15px;"><button onclick="wizardTemp.mode='weekdays'; renderScheduleStep()" style="background:${wizardTemp.mode==='weekdays'?'var(--accent-color)':'#333'}">By Weekdays</button><button onclick="wizardTemp.mode='dates'; renderScheduleStep()" style="background:${wizardTemp.mode==='dates'?'var(--accent-color)':'#333'}">By Specific Dates</button></div>`;
        
        if(wizardTemp.mode === 'weekdays') {
            html += `<p>${L.subjectDays}</p><div class="day-check-grid">` + days.map((d, i) => `<div class="day-check-item"><input type="checkbox" class="study-day-check" value="${i}" ${(wizardTemp.data.studyDays && wizardTemp.data.studyDays.includes(i)) || !wizardTemp.data.studyDays ? 'checked' : ''}> ${d}</div>`).join('') + `</div>`;
        } else {
            html += `<p>Select dates from the calendar range:</p><div class="day-check-grid">`;
            let start = new Date(wizardTemp.data.start);
            let end = new Date(wizardTemp.data.end);
            for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate()+1)) {
                let dStr = dt.toISOString().split('T')[0];
                html += `<div class="day-check-item"><input type="checkbox" class="specific-date-check" value="${dStr}" checked> ${dt.toDateString()}</div>`;
            }
            html += `</div>`;
        }
        
        html += `<button onclick="calcChronos()">${L.next}</button><br><button style="background:transparent; color:gray;" onclick="goToStep(2)">${L.back}</button>`;
        content.innerHTML = html;
    }

    function setLang() { currentLang = document.getElementById('l-sel').value; translateApp(); goToStep('auth'); }

    function handleAuth(type) {
        const name = document.getElementById('a-name').value.trim();
        const pass = document.getElementById('a-pass').value.trim();
        if(!name || !pass) return alert("Credentials required");
        if(type === 'signup') {
            if(state.users[name]) return alert("Name taken");
            state.users[name] = { pass, plans: [], routine: "", memos: "", weekdayH: 0, weekendH: 0, weekends: [0, 6], activeIndex: 0 };
            alert("New Soul Created. Now click Awaken to begin.");
        } else {
            if(state.users[name] && state.users[name].pass === pass) {
                state.currentUser = name;
                const u = state.users[name];
                if(!u.weekdayH) goToStep('stats');
                else if(u.plans.length === 0) { wizardTemp.data = {}; goToStep(1); }
                else showApp();
            } else alert("Unknown soul.");
        }
        persist();
    }

    function saveStats() {
        const u = state.users[state.currentUser];
        u.weekdayH = parseFloat(document.getElementById('h-week').value) || 0;
        u.weekendH = parseFloat(document.getElementById('h-end').value) || 0;
        const checks = document.querySelectorAll('#weekend-checks input:checked');
        u.weekends = Array.from(checks).map(c => parseInt(c.value));
        persist(); 
        if(u.plans.length === 0 || wizardTemp.editingIndex !== null) goToStep(1);
        else showApp();
    }

    function openWizard() { wizardTemp = { editingIndex: null, data: {}, mode: 'weekdays' }; goToStep(1); document.getElementById('onboarding-overlay').classList.remove('hidden'); }
    function closeWizard() { document.getElementById('onboarding-overlay').classList.add('hidden'); }

    function editRitual(idx) {
        wizardTemp.editingIndex = idx;
        wizardTemp.data = JSON.parse(JSON.stringify(state.users[state.currentUser].plans[idx]));
        document.getElementById('onboarding-overlay').classList.remove('hidden');
        goToStep(1);
    }

    function saveR1() {
        wizardTemp.data.title = document.getElementById('r-title').value || "Ritual";
        wizardTemp.data.goal = document.getElementById('r-goal').value;
        goToStep(2);
    }

    function saveR2() {
        wizardTemp.data.chapters = parseInt(document.getElementById('r-chaps').value);
        wizardTemp.data.start = document.getElementById('r-start').value;
        wizardTemp.data.end = document.getElementById('r-end').value;
        if(!wizardTemp.data.start || !wizardTemp.data.end) return alert("Dates needed");
        goToStep(3);
    }

    function calcChronos() {
        const u = state.users[state.currentUser];
        const d = wizardTemp.data;
        let totalHours = 0;

        if(wizardTemp.mode === 'weekdays') {
            const checks = document.querySelectorAll('.study-day-check:checked');
            d.studyDays = Array.from(checks).map(c => parseInt(c.value));
            d.specificDates = null;
            let start = new Date(d.start), end = new Date(d.end);
            for(let dt = new Date(start); dt <= end; dt.setDate(dt.getDate()+1)) {
                let day = dt.getDay();
                if(d.studyDays.includes(day)) totalHours += u.weekends.includes(day) ? u.weekendH : u.weekdayH;
            }
        } else {
            const checks = document.querySelectorAll('.specific-date-check:checked');
            d.specificDates = Array.from(checks).map(c => c.value);
            d.studyDays = null;
            d.specificDates.forEach(dateStr => {
                let dt = new Date(dateStr);
                totalHours += u.weekends.includes(dt.getDay()) ? u.weekendH : u.weekdayH;
            });
        }

        d.hoursPerChapter = (totalHours / d.chapters).toFixed(1);

        if(d.hoursPerChapter < 3) {
            const L = i18n[currentLang] || i18n['en'];
            document.getElementById('step-content').innerHTML = `
                <h2 style="color:#ff3333">${L.caution}</h2>
                <div class="caution-box">
                    <p>Recommendation: 3 hrs per chapter.</p>
                    <p>Ur hours = <b>${d.hoursPerChapter}h</b></p>
                </div>
                <button onclick="finalizeR()">${L.opt1}</button>
                <button onclick="goToStep(2)" style="background:#333">${L.opt2}</button>
                <button onclick="goToStep('stats')" style="background:#440044">${L.opt3}</button>`;
        } else {
            finalizeR();
        }
    }

    function finalizeR() {
        const u = state.users[state.currentUser];
        if(!wizardTemp.data.chapterList || wizardTemp.data.chapterList.length !== wizardTemp.data.chapters) {
            wizardTemp.data.chapterList = Array.from({length: wizardTemp.data.chapters}, (_, i) => ({ title: `Chapter ${i+1}`, done: false }));
        }
        if(wizardTemp.editingIndex !== null) u.plans[wizardTemp.editingIndex] = wizardTemp.data;
        else { u.plans.push(wizardTemp.data); u.activeIndex = u.plans.length - 1; }
        persist(); showApp();
    }

    function showApp() {
        document.getElementById('onboarding-overlay').classList.add('hidden');
        document.getElementById('main-app').style.visibility = 'visible';
        document.getElementById('main-app').style.display = 'grid';
        renderAll();
    }

    function renderAll() {
        const u = state.users[state.currentUser];
        if(!u) return;
        document.getElementById('alchemist-name-display').innerText = state.currentUser.toUpperCase();
        document.getElementById('routine-text').value = u.routine || "";
        document.getElementById('memo-text').value = u.memos || "";
        
        const activeDisp = document.getElementById('active-ritual-display');
        if(u.plans.length > 0) {
            const p = u.plans[u.activeIndex];
            const done = p.chapterList.filter(c => c.done).length;
            activeDisp.innerHTML = `<div class="mini-card" style="border-color: var(--gold-leaf); border-width: 2px;">
                <h2 class="metallic-text">${p.title}</h2><p>${p.goal} • ${done}/${p.chapters} Chapters • ${p.hoursPerChapter}h/ch</p>
                <button onclick="openSanctum(${u.activeIndex})" style="margin-top:10px;">Open Sanctum</button></div>`;
        } else {
            activeDisp.innerHTML = ""; // Bar completely removed on banish
        }
        
        const list = document.getElementById('grimoire-list');
        list.innerHTML = "";
        u.plans.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = "mini-card"; card.style.marginTop = "0";
            card.innerHTML = `<h4 class="metallic-text">${p.title}</h4><button onclick="setActive(${i})">Focus</button>
                <button onclick="editRitual(${i})" style="background:#444">Modify</button><button onclick="deleteR(${i})" style="background:maroon">Banish</button>`;
            list.appendChild(card);
        });
        translateApp();
    }

    function openSanctum(idx) {
        switchTab('chapters');
        const p = state.users[state.currentUser].plans[idx];
        document.getElementById('sanctum-title').innerText = p.title;
        const container = document.getElementById('chapter-list-container');
        container.innerHTML = "";
        p.chapterList.forEach((c, i) => {
            const row = document.createElement('div');
            row.style.display = "flex"; row.style.alignItems = "center"; row.style.gap = "15px"; row.style.padding = "10px 0";
            row.innerHTML = `<input type="checkbox" ${c.done?'checked':''} onchange="toggleC(${idx},${i})" style="width:25px; height:25px;">
                             <input type="text" value="${c.title}" onchange="nameC(${idx},${i},this.value)" style="margin:0; border:none; border-bottom:1px solid #555; background:transparent; color:white; flex-grow:1;">`;
            container.appendChild(row);
        });
    }

    function toggleC(pi, ci) { state.users[state.currentUser].plans[pi].chapterList[ci].done = !state.users[state.currentUser].plans[pi].chapterList[ci].done; persist(); renderAll(); }
    function nameC(pi, ci, val) { state.users[state.currentUser].plans[pi].chapterList[ci].title = val; persist(); }
    function setActive(i) { state.users[state.currentUser].activeIndex = i; persist(); renderAll(); }
    function deleteR(i) { if(confirm("Banish this ritual?")) { state.users[state.currentUser].plans.splice(i,1); state.users[state.currentUser].activeIndex = 0; persist(); renderAll(); } }

    function switchTab(t) {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
        if(document.getElementById('tab-'+t)) document.getElementById('tab-'+t).classList.add('active');
    }

    function saveStatic() {
        const u = state.users[state.currentUser];
        u.routine = document.getElementById('routine-text').value;
        u.memos = document.getElementById('memo-text').value;
        persist(); alert("Sealed.");
    }

    async function fetchOracle() {
        try {
            const resp = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${new Date().getFullYear()}/IN`);
            const data = await resp.json();
            const today = new Date().toISOString().split('T')[0];
            const found = data.find(h => h.date === today);
            const target = document.getElementById('oracle-data');
            if(found) { 
                document.body.classList.add('theme-festive-gold'); 
                target.innerHTML = `<h1 class="metallic-text">🏮 ${found.localName}</h1><p>Planetary energy is abundant for the festival.</p>`; 
            } else { target.innerHTML = "<p>The stars are balanced. No festivals today.</p>"; }
        } catch(e) { console.log("Oracle offline"); }
    }

    function logout() { state.currentUser = null; persist(); location.reload(); }
    function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
</script>
</body>
</html>
